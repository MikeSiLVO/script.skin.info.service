# Ruff configuration for script.skin.info.service

line-length = 100

[lint]

extend-select = [
    "E501",  # Line too long (enforced at line-length above)
]

ignore = [
    "E402",  # Module level import not at top - needed for Kodi addon initialization order
]

[lint.per-file-ignores]
# Specific file ignores
"resources/lib/blur.py" = [
    "F401",  # Unused import - PIL imports used only to test availability
]
