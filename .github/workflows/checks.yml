name: Code checks

on:
  push:
    branches: [main]
    paths-ignore: ['**/*.po']
  pull_request:
    branches: [main]
    paths-ignore: ['**/*.po']

jobs:
  checks:
    if: github.repository == 'MikeSiLVO/script.skin.info.service'
    uses: MikeSiLVO/workflows/.github/workflows/checks.yml@v1
    with:
      deps: requests Pillow
